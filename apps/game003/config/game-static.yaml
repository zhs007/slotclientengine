# 配置版本。后续 schema 变化时递增，当前 buildgamestatic 只支持 1。
schemaVersion: 1

# 游戏静态身份。brandLabel 会显示在框架 UI 上，发布流程可改文案但不改运行时代码。
gameId: game003
brandLabel: minecart2

# 固定 live 连接信息。serverUrl 不允许被 URL query 覆盖，gamecode 可由旧链接携带但必须完全一致。
live:
  serverUrl: wss://gameserv.rgstest.slammerstudios.com/
  gamecode: EfedJuHEaydXNghnmO9KI
  # 旧链接如果继续携带这些参数，初始化必须显式失败。
  rejectQueryParams:
    - serverUrl

# 当前第一版只支持 skin=1；新增皮肤时先补这里和下方 skins。
supportedSkins:
  - "1"

# 只引用 apps/gengameconfig 已生成的逻辑配置，不在 YAML 里复制 reel / paytable 内容。
gameConfig: assets/gamecfg003/gameconfig.json

# 主转轮表现参数。kind=normal 表示继续使用 rendercore 普通转轮和本地公开轮带。
reel:
  kind: normal
  reelsName: bg-reel01
  reelCount: 5
  visibleRows: 5
  direction: forward
  minimumSpinCycles: 8
  baseDurationMs: 1300
  speedSymbolsPerSecond: 44
  startDelayMs: 80
  stopDelayMs: 120

# 首屏 loading 资源清单。这里只放随游戏包发布的静态资源，不放 token、cookie、服务器真实轮带或本次下注。
# path 是仓库根目录相对路径；glob 必须是明确资源组，不能用宽泛 *.png 混入其它美术资源。
# weight 是资源组总权重；glob 展开后由生成文件平均分摊到每个具体资源。
loading:
  resources:
    - id: game003-bg-landscape
      path: assets/game003-s1/bg1.jpg
      weight: 8
    - id: game003-bg-portrait
      path: assets/game003-s1/bg2.jpg
      weight: 8
    - id: game003-scene-parts
      glob: assets/game003-s1/{mainreelbg,conveyor1,conveyor2}.png
      weight: 6
    - id: game003-symbol-normal-pngs
      glob: assets/game003-s1/{WL,H1,H2,H3,H4,H5,L1,L2,L3,L4,L5,CO,CL,SC}.png
      weight: 10
    - id: game003-symbol-spin-blur-pngs
      glob: assets/game003-s1/{WL,H1,H2,H3,H4,H5,L1,L2,L3,L4,L5,CO,CL,SC}.spinBlur.png
      weight: 6
    - id: game003-symbol-disabled-pngs
      glob: assets/game003-s1/{WL,H1,H2,H3,H4,H5,L1,L2,L3,L4,L5,CO,CL,SC}.disabled.png
      weight: 6
    - id: game003-symbol-vni-projects
      glob: assets/game003-s1/*-wins.json
      weight: 2
    - id: game003-symbol-vni-assets
      glob: assets/game003-s1/assets/*.{png,jpg,jpeg,webp}
      weight: 4
    - id: game003-symbol-spine-skeletons
      # 只纳入当前主转轮已存在且本次 Spine 化的 symbol；新增 JSON 资源不要用宽泛 *.json 接入。
      glob: assets/game003-s1/{WL,H1,H2,H3,H4,H5,CL,SC}.json
      weight: 2
    - id: game003-symbol-spine-atlas
      path: assets/game003-s1/Symbol.atlas
      weight: 1
    - id: game003-symbol-spine-texture
      path: assets/game003-s1/Symbol.png
      weight: 3
    - id: game003-bg-bar-symbol-pngs
      glob: assets/game003-s1/{wild,up}.png
      weight: 2
    - id: game003-bg-bar-symbol-manifest
      path: assets/game003-s1/bg-bar-symbol-state-textures.manifest.json
      weight: 1
    - id: game003-minecart
      path: assets/game003-s1/minecart.png
      weight: 1

# 每套皮肤的资源和布局配置。这里适合美术或发布配置人员改静态路径和坐标。
skins:
  "1":
    label: skin 1
    # symbol 集合和缩放以 manifest 为准，YAML 不维护第二份 scale 表。
    # VNI project/assets 只用于 manifest 驱动的 symbol 中奖动画；这里不承载 token、cookie、服务器真实轮带或玩家本次下注。
    symbols:
      manifest: assets/game003-s1/symbol-state-textures.manifest.json
      pngGlob: assets/game003-s1/*.png
      vniProjectGlob: assets/game003-s1/*-wins.json
      vniAssetGlob: assets/game003-s1/assets/*.{png,jpg,jpeg,webp}
      # Spine 资源只用于 manifest 声明的高级 symbol 动画；skeleton 必须用 brace JSON，不能写宽泛 *.json 混入 VNI / win-amount / 暂不处理的新资源。
      spineSkeletonGlob: assets/game003-s1/{WL,H1,H2,H3,H4,H5,CL,SC}.json
      spineAtlasGlob: assets/game003-s1/{Symbol}.atlas
      spineTextureGlob: assets/game003-s1/{Symbol}.png
      emptySymbols: []
      requireExplicitScale: true
      requiredStates:
        - spinBlur
        - disabled
    # bg-bar 是 game003 传送带玩法的 feature 轨道。componentName 来自 live GMI；
    # symbols 使用独立 manifest，不复用主转轮 symbol manifest；normal 是显式透明 symbol，不对应 PNG。
    featureBars:
      bgBar:
        componentName: bg-bar
        queueLength: 5
        visibleCount: 4
        terminalSlotIndex: 4
        emptyFeature: normal
        allowedFeatures:
          - normal
          - wild
          - up
        symbols:
          manifest: assets/game003-s1/bg-bar-symbol-state-textures.manifest.json
          pngGlob: assets/game003-s1/{wild,up}.png
          requireExplicitScale: true
          requiredStates: []
        layout:
          landscape:
            movement: down
            # slotRectsInConveyor 坐标相对于 conveyor1.png 左上角，按运动方向从入口到终点排列。
            # 每个 rect 是传送带视觉格子，不是 symbol 尺寸；运行时以 rect 中心对齐 symbol 中心。
            # 不允许运行时按 conveyor 高度等分推导。
            slotRectsInConveyor:
              - { x: 55, y: 75, width: 174, height: 126 }
              - { x: 55, y: 204, width: 174, height: 132 }
              - { x: 55, y: 339, width: 174, height: 132 }
              - { x: 55, y: 474, width: 174, height: 132 }
              - { x: 55, y: 609, width: 174, height: 132 }
          portrait:
            movement: right
            # slotRectsInConveyor 坐标相对于 conveyor2.png 左上角，按运动方向从入口到终点排列。
            # 每个 rect 是传送带视觉格子，不是 symbol 尺寸；运行时以 rect 中心对齐 symbol 中心。
            slotRectsInConveyor:
              - { x: 74, y: 55, width: 153, height: 115 }
              - { x: 232, y: 55, width: 153, height: 115 }
              - { x: 390, y: 55, width: 153, height: 115 }
              - { x: 548, y: 55, width: 153, height: 115 }
              - { x: 706, y: 55, width: 153, height: 115 }
    # appExtensions 是 app 层专属静态扩展。shared 包只透传对象，不理解 game003MinecartInteraction 语义。
    # 这里只放美术、配置人员和发布流程可改的静态坐标与时间，不放 token、cookie、服务器真实轮带或玩家本次下注。
    appExtensions:
      game003WinSymbolLoop:
        # 一轮 bg-wins result 全部播放完后，暂停多久再从第一个 result 继续循环。
        cyclePauseSeconds: 1
        resultAmount:
          # 金额锚点相对中奖 symbol cell 中心向下偏移；坐标基准是主转轮本地 cell。
          yOffsetRatioFromCellCenter: 0.22
          fontSize: 38
          fill: "#fff7d6"
          stroke: "#5a2500"
          strokeWidth: 5
      game003CoinOverlay:
        # bg-gencoins 是服务端当前用于提供 CO 金额矩阵的组件名；只允许 app 层识别该语义。
        componentName: bg-gencoins
        # coinSymbol 必须能在 assets/gamecfg003/gameconfig.json 的 symbolCodes 中找到。
        coinSymbol: CO
        text:
          # 金额文本锚到 CO symbol cell 中心，按 cellHeight 做 y 偏移。
          yOffsetRatioFromCellCenter: 0.08
          fontSize: 32
          fill: "#fff7d6"
          stroke: "#5a2500"
          strokeWidth: 4
      game003MinecartInteraction:
        loadingResourceId: game003-minecart
        imageSize:
          width: 369
          height: 252
        timing:
          # 总入场互动 = bg-bar shift + 终点 win + 矿车冲入刹车 + payload 飞入 + payload 停留，必须早于主转轮停轴。
          # cartExitDurationSeconds 用于下一轮 spin 开始时的右侧出屏，不计入上一轮入场预算。
          cartExitDurationSeconds: 0.18
          cartRushDurationSeconds: 0.26
          symbolFlyDurationSeconds: 0.43
          symbolHoldDurationSeconds: 0.12
          maxTotalBeforeReelStopSeconds: 1.3
        motion:
          overshootPixels: 34
          brakeTiltDegrees: 14
          reboundTiltDegrees: -8
        payload:
          # symbolScale 是在 bg-bar manifest / catalog scale 之上的额外缩放；1 表示保持原始显示尺寸。
          symbolScale: 1
          fadeStartAlpha: 1
          fadeEndAlpha: 0
        layout:
          landscape:
            entrySide: left
            exitSide: right
            offscreenMargin: 120
            # 停点坐标相对当前横屏主转轮可见区底部中心，单位是横屏 art 像素。
            stopOffsetFromReelAreaBottomCenter: { x: 0, y: 85 }
            # cartPivotInImage 是 minecart.png 图片内 pivot，按车轮落轨点校准；不是 CSS/viewport 坐标。
            cartPivotInImage: { x: 184.5, y: 220 }
            # payloadAnchorInImage 是车厢装载区中心，payload 起飞前会对齐到该图片内点。
            payloadAnchorInImage: { x: 184.5, y: 126 }
          portrait:
            entrySide: left
            exitSide: right
            offscreenMargin: 120
            # 停点坐标相对当前竖屏主转轮可见区底部中心，按前景轨道校准。
            stopOffsetFromReelAreaBottomCenter: { x: 0, y: 145 }
            cartPivotInImage: { x: 184.5, y: 220 }
            payloadAnchorInImage: { x: 184.5, y: 126 }
    # 横竖屏 art 适配。focusRect 坐标相对于对应完整背景 art。
    # focusRect 既是背景图上的重点区域，也是 game003 主转轴框和传送带的相对定位 anchor。
    # 坐标基准是完整背景 art，不是 CSS 像素、viewport 像素或裁切后的 visible rect。
    art:
      mode: orientation-focus
      variants:
        landscape:
          # 横版背景和重点区域。frameFocusRect 给 DOM frame 计算逻辑尺寸上限使用。
          background:
            path: assets/game003-s1/bg1.jpg
            width: 2000
            height: 2000
          focusRect:
            x: 288
            y: 588
            width: 1424
            height: 824
          frameFocusRect:
            width: 1424
            height: 1061
          # mainreelbg.png 左上角相对 focusRect 左上角的偏移；横屏主转轮相对原位置上移 10px。
          mainReelBackgroundPositionInFocusRect:
            x: 294
            y: -10
          conveyor:
            path: assets/game003-s1/conveyor1.png
            width: 284
            height: 775
            # 传送带左上角相对 focusRect 左上角的偏移；横屏与主转轮垂直中心对齐。
            positionInFocusRect:
              x: 0
              y: 14.5
        portrait:
          # 竖版背景和重点区域。minFocusMargin 约束竖版两侧黑边裁切。
          background:
            path: assets/game003-s1/bg2.jpg
            width: 1174
            height: 2000
          focusRect:
            x: 22
            y: 469.5
            width: 1130
            height: 1061
          frameFocusRect:
            width: 1130
            height: 1061
          minFocusMargin:
            left: 22
            right: 22
          # mainreelbg.png 左上角相对 focusRect 左上角的偏移；竖屏主转轮与传送带作为一组继续上移 50px。
          mainReelBackgroundPositionInFocusRect:
            x: 0
            y: 147
          conveyor:
            path: assets/game003-s1/conveyor2.png
            width: 934
            height: 227
            # 传送带左上角相对 focusRect 左上角的偏移；竖屏与主转轮之间保持 0px 间距，并随主转轮整体上移。
            positionInFocusRect:
              x: 98
              y: -80
      # 主转轮框资源和窗口坐标属于 game003 专属布局，不上移到 rendercore。
      mainReelBackground:
        path: assets/game003-s1/mainreelbg.png
        width: 1130
        height: 824
      # 转轮区坐标相对于 mainreelbg.png；它不是主转轮背景框本身，单独控制转轮内容位置、轴间距和 5x5 单格尺寸。
      reelAreaInMainReelBackground:
        x: 124
        y: 130
        reelCount: 5
        reelGap: 15
        cellWidth: 165
        cellHeight: 130
    # 中奖金额动画。金额输入来自 live/GMI 的服务器整数，amountScale 只用于显示格式。
    # big/super/mega VNI project 按资源自身 100% 尺寸渲染；stage 尺寸不作为运行时缩放适配依据。
    # 这里只放静态显示、阈值和资源配置，不放 token、cookie、服务器真实轮带或玩家本次下注。
    winAmount:
      amountScale: 100
      currency: USD
      locale: en-US
      # minor 负责 0 -> 1x；major 只负责 1x -> 15x 的纯数字变化，不启动 big/super/mega。
      minorCountDurationSeconds: 1.5
      majorCountDurationSeconds: 3
      thresholds:
        minorMultiplier: 1
        bigMultiplier: 15
        superMultiplier: 30
        megaMultiplier: 50
      text:
        minorFontSize: 54
        majorFontSize: 118
        fill: "#fff7d6"
        stroke: "#5a2500"
        strokeWidth: 8
      layout:
        minorAnchor: reel-area-bottom-center
        majorAnchor: reel-area-center
        # offset 坐标以对应 anchor 计算后的 art 坐标为基准，单位是当前 art 像素。
        minorOffset:
          x: 0
          y: -28
        majorOffset:
          x: 0
          y: 0
      animations:
        # big/super/mega 的 VNI project、assets 和三段式时间只维护在 manifest 中，避免 YAML 形成第二份时间表。
        manifest: assets/game003-s1/win-amount/win-amount.manifest.json
